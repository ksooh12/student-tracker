<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 소재 확인 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

:root {
  --navy: #1a2744;
  --navy-light: #2d3f6b;
  --navy-muted: #4a5a8a;
  --accent: #e85d26;
  --green: #1a7a4a;
  --red: #c0392b;
  --blue: #1a5fa8;
  --purple: #6d28d9;
  --amber: #b45309;
  --bg: #f2f4f9;
  --surface: #ffffff;
  --border: #dde3f0;
  --text: #1a2744;
  --text-muted: #64748b;
  --text-light: #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.page { display: none; min-height: 100vh; }
.page.active { display: flex; }

/* ══ 로그인 ══ */
#loginPage {
  align-items: center; justify-content: center;
  background: var(--navy);
  padding: 24px; position: relative; overflow: hidden;
}
#loginPage::before {
  content:''; position:absolute;
  width:500px; height:500px; border-radius:50%;
  background:rgba(255,255,255,0.03);
  top:-180px; right:-120px; pointer-events:none;
}
#loginPage::after {
  content:''; position:absolute;
  width:380px; height:380px; border-radius:50%;
  background:rgba(232,93,38,0.07);
  bottom:-120px; left:-80px; pointer-events:none;
}

.login-card {
  background:white; border-radius:20px;
  padding:44px 40px 40px;
  width:100%; max-width:420px;
  position:relative; z-index:1;
  box-shadow:0 24px 64px rgba(0,0,0,0.3);
}
.login-logo {
  width:52px; height:52px; background:var(--navy);
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; margin-bottom:22px;
}
.login-title { font-size:24px; font-weight:900; color:var(--navy); line-height:1.25; letter-spacing:-0.5px; }
.login-sub { font-size:13px; color:var(--text-muted); margin-top:7px; line-height:1.6; }
.login-divider { height:1px; background:var(--border); margin:24px 0; }

.field-label {
  display:block; font-size:11px; font-weight:700;
  color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px;
  margin-bottom:8px;
}
.login-input {
  width:100%; height:50px;
  border:2px solid var(--border); border-radius:10px;
  padding:0 16px; font-size:16px; font-family:inherit; font-weight:500;
  color:var(--text); background:var(--bg);
  transition:border-color 0.15s, background 0.15s; outline:none;
}
.login-input:focus { border-color:var(--navy); background:white; }
.login-input::placeholder { color:var(--text-light); font-weight:400; }
.login-input.err { border-color:var(--red); }

.login-err-msg { font-size:12px; color:var(--red); margin-top:6px; display:none; }
.login-err-msg.show { display:block; }

.login-btn {
  width:100%; height:52px;
  background:var(--navy); color:white;
  border:none; border-radius:10px;
  font-size:15px; font-weight:700; font-family:inherit;
  cursor:pointer; margin-top:14px;
  transition:background 0.15s, transform 0.1s;
}
.login-btn:hover { background:var(--navy-light); }
.login-btn:active { transform:scale(0.98); }
.login-btn:disabled { opacity:0.6; cursor:not-allowed; }

.saved-hint { margin-top:12px; font-size:12px; color:var(--text-muted); text-align:center; display:none; }
.saved-hint.show { display:block; }
.saved-hint a { color:var(--blue); cursor:pointer; text-decoration:underline; }

.login-notice {
  margin-top:18px; background:#fff8f0;
  border:1px solid #fcd4ae; border-radius:8px;
  padding:10px 14px; font-size:12px; color:#7a4500;
  line-height:1.6; display:flex; gap:8px; align-items:flex-start;
}

/* ══ 메인 ══ */
#mainPage { flex-direction:column; }

.topbar {
  background:var(--navy); color:white;
  height:56px; padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; position:sticky; top:0; z-index:100;
}
.topbar-left { display:flex; align-items:center; gap:10px; }
.topbar-icon { width:30px; height:30px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.topbar-title { font-size:14px; font-weight:700; }
.topbar-sub { font-size:10px; color:rgba(255,255,255,0.45); margin-top:1px; }
.topbar-right { display:flex; align-items:center; gap:10px; }

.live-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:rgba(255,255,255,0.6); }
.live-dot { width:6px; height:6px; background:#4ade80; border-radius:50%; animation:blink 2s infinite; }
.live-dot.red { background:#f87171; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.teacher-chip { display:flex; align-items:center; gap:7px; background:rgba(255,255,255,0.1); border-radius:20px; padding:5px 12px 5px 5px; }
.chip-avatar { width:24px; height:24px; border-radius:50%; background:var(--accent); color:white; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.chip-name { font-size:12px; font-weight:600; }

.logout-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:6px; padding:5px 10px; font-size:11px; font-family:inherit; cursor:pointer; transition:background 0.15s; }
.logout-btn:hover { background:rgba(255,255,255,0.18); }

.main-body { display:grid; grid-template-columns:1fr 340px; gap:16px; max-width:1160px; width:100%; margin:0 auto; padding:16px; flex:1; }
@media(max-width:860px){ .main-body { grid-template-columns:1fr; } }

.card { background:var(--surface); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.card-head { padding:12px 16px; border-bottom:1px solid var(--border); background:#fafbfe; display:flex; align-items:center; justify-content:space-between; }
.card-head-title { font-size:12px; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:6px; }
.card-head-icon { width:20px; height:20px; background:var(--navy); border-radius:5px; font-size:10px; color:white; display:flex; align-items:center; justify-content:center; }
.card-body { padding:16px; }

.sec-label { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; display:flex; align-items:center; gap:8px; margin:16px 0 8px; }
.sec-label:first-child { margin-top:0; }
.sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

.loc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:7px; }

.loc-btn { display:flex; flex-direction:column; align-items:center; gap:5px; padding:13px 6px 11px; border-radius:10px; border:1.5px solid transparent; background:var(--bg); cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; color:var(--text); transition:all 0.13s; text-align:center; line-height:1.3; }
.loc-btn .ico { font-size:22px; line-height:1; }
.loc-btn:active { transform:scale(0.95); }
.loc-btn:disabled { opacity:0.5; cursor:not-allowed; }

.loc-btn.blue   { border-color:#b3cef0; color:var(--blue);   background:#f0f6ff; }
.loc-btn.blue:hover   { background:#deeafb; }
.loc-btn.purple { border-color:#c4b5fd; color:var(--purple); background:#f5f3ff; }
.loc-btn.purple:hover { background:#ede9fe; }
.loc-btn.amber  { border-color:#fcd34d; color:var(--amber);  background:#fffbeb; }
.loc-btn.amber:hover  { background:#fef3c7; }

@keyframes pressed { 0%{transform:scale(1)} 30%{transform:scale(0.93)} 70%{transform:scale(1.04)} 100%{transform:scale(1)} }
.loc-btn.flash { animation:pressed 0.5s ease; }

/* 피드 */
.latest-box { margin:12px 16px 0; background:var(--navy); border-radius:10px; padding:12px 14px; display:none; }
.latest-box.show { display:block; }
.latest-label { font-size:10px; color:rgba(255,255,255,0.45); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; display:flex; align-items:center; gap:6px; }
.latest-label-dot { width:6px; height:6px; background:#4ade80; border-radius:50%; animation:blink 2s infinite; }
.latest-loc { font-size:15px; font-weight:700; color:white; margin-top:4px; }
.latest-meta { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }

.feed-scroll { max-height:calc(100vh - 240px); overflow-y:auto; }

.feed-item { display:flex; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); transition:background 0.1s; }
.feed-item:hover { background:var(--bg); }
.feed-item:last-child { border-bottom:none; }
@keyframes fadeSlide { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }
.feed-item.new { animation:fadeSlide 0.3s ease; }

.feed-left { display:flex; flex-direction:column; align-items:center; padding-top:3px; }
.feed-node { width:9px; height:9px; border-radius:50%; background:var(--text-light); flex-shrink:0; }
.feed-node.blue   { background:var(--blue); }
.feed-node.purple { background:var(--purple); }
.feed-node.amber  { background:var(--amber); }
.feed-stem { width:1px; flex:1; min-height:14px; background:var(--border); margin-top:4px; }
.feed-right { flex:1; }
.feed-loc-row { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.feed-loc { font-size:13px; font-weight:700; }
.feed-time { font-size:11px; font-weight:700; color:var(--navy-muted); white-space:nowrap; }
.feed-detail { font-size:11px; color:var(--text-muted); margin-top:2px; }
.feed-detail strong { color:var(--navy-muted); font-weight:600; }

.empty-state { display:flex; flex-direction:column; align-items:center; padding:44px 20px; color:var(--text-light); gap:8px; text-align:center; }
.empty-ico { font-size:32px; }
.empty-txt { font-size:12px; line-height:1.7; }

.feed-foot { padding:8px 16px; font-size:10px; color:var(--text-light); border-top:1px solid var(--border); background:#fafbfe; text-align:center; }

.count-badge { background:var(--accent); color:white; font-size:11px; font-weight:700; border-radius:10px; padding:1px 8px; }

/* 토스트 */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a2744; color:white; border-radius:10px; padding:12px 20px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:8px; box-shadow:0 8px 24px rgba(0,0,0,0.2); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:999; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast-check { width:20px; height:20px; background:#4ade80; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.toast.err-toast { background:#c0392b; }
.toast.err-toast .toast-check { background:rgba(255,255,255,0.3); }
</style>
</head>
<body>

<!-- ══ 로그인 페이지 ══ -->
<div id="loginPage" class="page active">
  <div class="login-card">
    <div class="login-logo">👁</div>
    <div class="login-title">학생 소재<br>확인 시스템</div>
    <div class="login-sub">담임교사단 실시간 공유 · 발견 즉시 기록</div>
    <div class="login-divider"></div>

    <label class="field-label" for="nameInput">교사 이름</label>
    <input type="text" id="nameInput" class="login-input"
      placeholder="예: 김교사" maxlength="10" autocomplete="off">
    <div class="login-err-msg" id="nameErr">이름을 입력해주세요.</div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">입장하기 →</button>

    <div class="saved-hint" id="savedHint">
      이전 접속: <a onclick="useSaved()" id="savedLink"></a>
    </div>

    <div class="login-notice">
      <span>⚠️</span>
      <span>입력하신 이름은 발견 기록과 함께 다른 교사에게 공유됩니다. 실명 또는 약칭으로 입력하세요.</span>
    </div>
  </div>
</div>

<!-- ══ 메인 페이지 ══ -->
<div id="mainPage" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">👁</div>
      <div>
        <div class="topbar-title">학생 소재 확인 시스템</div>
        <div class="topbar-sub">담임교사단 실시간 공유</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="live-badge">
        <div class="live-dot" id="liveDot"></div>
        <span id="liveLabel">연결 중</span>
      </div>
      <div class="teacher-chip">
        <div class="chip-avatar" id="chipAvatar"></div>
        <div class="chip-name" id="chipName"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>

  <div class="main-body">
    <!-- 왼쪽: 장소 선택 -->
    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <div class="card-head-icon">📍</div>
          발견 장소 선택
        </div>
      </div>
      <div class="card-body">
        <div class="sec-label">🏫 교실 · 특별실</div>
        <div class="loc-grid">
          <button class="loc-btn blue" onclick="report('3-4 교실','blue')"><span class="ico">🚪</span>3-4 교실</button>
          <button class="loc-btn blue" onclick="report('위클래스','blue')"><span class="ico">💬</span>위클래스</button>
          <button class="loc-btn blue" onclick="report('과학실','blue')"><span class="ico">🔭</span>과학실</button>
          <button class="loc-btn blue" onclick="report('도서관','blue')"><span class="ico">📚</span>도서관</button>
          <button class="loc-btn blue" onclick="report('체육관','blue')"><span class="ico">🏀</span>체육관</button>
          <button class="loc-btn blue" onclick="report('보건실','blue')"><span class="ico">🏥</span>보건실</button>
          <button class="loc-btn blue" onclick="report('미래정보실','blue')"><span class="ico">💻</span>미래정보실</button>
          <button class="loc-btn blue" onclick="report('미술실','blue')"><span class="ico">🎨</span>미술실</button>
        </div>

        <div class="sec-label">🚶 복도</div>
        <div class="loc-grid">
          <button class="loc-btn purple" onclick="report('3학년 복도','purple')"><span class="ico">〽</span>3학년 복도</button>
          <button class="loc-btn purple" onclick="report('1층 복도','purple')"><span class="ico">〽</span>1층 복도</button>
        </div>

        <div class="sec-label">🚻 화장실 · 탈의실</div>
        <div class="loc-grid">
          <button class="loc-btn amber" onclick="report('2층 화장실','amber')"><span class="ico">🚻</span>2층 화장실</button>
          <button class="loc-btn amber" onclick="report('1층 화장실','amber')"><span class="ico">🚻</span>1층 화장실</button>
          <button class="loc-btn amber" onclick="report('2층 탈의실','amber')"><span class="ico">👕</span>2층 탈의실</button>
          <button class="loc-btn amber" onclick="report('1층 탈의실','amber')"><span class="ico">👕</span>1층 탈의실</button>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 발견 기록 -->
    <div class="card" style="display:flex;flex-direction:column;">
      <div class="card-head">
        <div class="card-head-title">
          <div class="card-head-icon">📋</div>
          발견 기록
        </div>
        <div class="count-badge" id="feedCount">0</div>
      </div>

      <div class="latest-box" id="latestBox">
        <div class="latest-label">
          <div class="latest-label-dot"></div>
          가장 최근 발견
        </div>
        <div class="latest-loc" id="latestLoc"></div>
        <div class="latest-meta" id="latestMeta"></div>
      </div>

      <div class="feed-scroll" id="feedList">
        <div class="empty-state">
          <div class="empty-ico">👀</div>
          <div class="empty-txt">아직 발견 기록이 없습니다.<br>장소 버튼을 누르면 여기에 기록됩니다.</div>
        </div>
      </div>
      <div class="feed-foot" id="feedFoot">10초마다 자동 갱신</div>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast">
  <div class="toast-check" id="toastIcon">✓</div>
  <span id="toastMsg"></span>
</div>

<script>
/* ══ Firebase 설정 ══ */
const FB_URL = 'https://inhgms-default-rtdb.asia-southeast1.firebasedatabase.app/sightings';

/* ══ 상태 ══ */
const NAME_KEY = 'teacher_name_v1';
let currentTeacher = '';
let sightings = [];
let toastTimer = null;
let refreshTimer = null;

/* ══ 유틸 ══ */
function p(n){ return String(n).padStart(2,'0'); }
function timeStr(ts){ const d=new Date(ts); return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }
function timeShort(ts){ const d=new Date(ts); return p(d.getHours())+':'+p(d.getMinutes()); }
function dateStr(ts){ const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate(); }
function ago(ts){
  const m=Math.floor((Date.now()-ts)/60000);
  return m<1?'방금':m<60?m+'분 전':Math.floor(m/60)+'시간 전';
}
function saveLocal(v){ try{ localStorage.setItem(NAME_KEY,v); }catch(e){} }
function loadLocal(){ try{ return localStorage.getItem(NAME_KEY)||''; }catch(e){ return ''; } }

/* ══ Firebase REST API ══ */
async function fbPost(entry){
  const res = await fetch(FB_URL+'.json', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(entry)
  });
  if(!res.ok) throw new Error('저장 실패');
}

async function fbGet(){
  const res = await fetch(FB_URL+'.json?orderBy="ts"&limitToLast=200');
  if(!res.ok) throw new Error('불러오기 실패');
  const data = await res.json();
  if(!data) return [];
  return Object.values(data).sort((a,b)=> b.ts - a.ts);
}

/* ══ 로그인 ══ */
window.addEventListener('DOMContentLoaded', ()=>{
  const saved = loadLocal();
  if(saved){
    document.getElementById('nameInput').value = saved;
    document.getElementById('savedLink').textContent = saved+' 선생님으로 입장';
    document.getElementById('savedHint').classList.add('show');
  }
});

function useSaved(){
  const saved = loadLocal();
  if(saved){ document.getElementById('nameInput').value = saved; doLogin(); }
}

function doLogin(){
  const val = document.getElementById('nameInput').value.trim();
  const inp  = document.getElementById('nameInput');
  const err  = document.getElementById('nameErr');
  if(!val){
    inp.classList.add('err');
    err.classList.add('show');
    inp.focus(); return;
  }
  inp.classList.remove('err');
  err.classList.remove('show');
  currentTeacher = val;
  saveLocal(val);

  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('mainPage').classList.add('active');
  document.getElementById('chipAvatar').textContent = val.charAt(0);
  document.getElementById('chipName').textContent   = val+' 선생님';

  setLiveStatus('loading');
  loadSightings();
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(autoRefresh, 10000);
}

function doLogout(){
  if(!confirm('나가시겠습니까?\n저장된 이름은 유지됩니다.')) return;
  currentTeacher = '';
  if(refreshTimer) clearInterval(refreshTimer);
  document.getElementById('mainPage').classList.remove('active');
  document.getElementById('loginPage').classList.add('active');
  document.getElementById('nameInput').value = loadLocal();
}

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('loginPage').classList.contains('active')) doLogin();
});

/* ══ 연결 상태 표시 ══ */
function setLiveStatus(state){
  const dot   = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');
  if(state==='ok'){
    dot.classList.remove('red');
    label.textContent = '실시간';
  } else if(state==='error'){
    dot.classList.add('red');
    label.textContent = '연결 오류';
  } else {
    dot.classList.remove('red');
    label.textContent = '연결 중';
  }
}

/* ══ 발견 기록 ══ */
async function report(location, color){
  const entry = { ts: Date.now(), location, color, teacher: currentTeacher };
  setLocBtnsDisabled(true);
  try{
    await fbPost(entry);
    sightings.unshift(entry);
    renderFeed();
    showToast('📍 '+location+' — 공유 완료', false);
    flashBtn(location);
    setLiveStatus('ok');
  } catch(e){
    showToast('⚠️ 저장 실패. 인터넷 연결을 확인하세요.', true);
    setLiveStatus('error');
  } finally {
    setLocBtnsDisabled(false);
  }
}

function setLocBtnsDisabled(v){
  document.querySelectorAll('.loc-btn').forEach(b=> b.disabled = v);
}

async function loadSightings(){
  try{
    sightings = await fbGet();
    setLiveStatus('ok');
  } catch(e){
    setLiveStatus('error');
  }
  renderFeed();
}

async function autoRefresh(){
  try{
    sightings = await fbGet();
    setLiveStatus('ok');
  } catch(e){
    setLiveStatus('error');
  }
  renderFeed();
  document.getElementById('feedFoot').textContent = '마지막 갱신: '+timeStr(Date.now())+' · 10초마다 자동 갱신';
}

/* ══ 렌더 ══ */
function renderFeed(){
  const list     = document.getElementById('feedList');
  const cntBadge = document.getElementById('feedCount');
  const latBox   = document.getElementById('latestBox');

  cntBadge.textContent = sightings.length;

  if(!sightings.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-ico">👀</div><div class="empty-txt">아직 발견 기록이 없습니다.<br>장소 버튼을 누르면 여기에 기록됩니다.</div></div>`;
    latBox.classList.remove('show'); return;
  }

  const lat = sightings[0];
  latBox.classList.add('show');
  document.getElementById('latestLoc').textContent  = '📍 '+lat.location;
  document.getElementById('latestMeta').textContent = lat.teacher+' 선생님 · '+timeStr(lat.ts);

  list.innerHTML = sightings.slice(0,100).map((s,i)=>`
    <div class="feed-item ${i===0?'new':''}">
      <div class="feed-left">
        <div class="feed-node ${s.color||''}"></div>
        <div class="feed-stem"></div>
      </div>
      <div class="feed-right">
        <div class="feed-loc-row">
          <div class="feed-loc">📍 ${s.location}</div>
          <div class="feed-time">${timeShort(s.ts)}</div>
        </div>
        <div class="feed-detail"><strong>${s.teacher} 선생님</strong> · ${dateStr(s.ts)} · ${ago(s.ts)}</div>
      </div>
    </div>`).join('');
}

/* ══ 토스트 ══ */
function showToast(msg, isErr=false){
  const t   = document.getElementById('toast');
  const ico = document.getElementById('toastIcon');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('err-toast', isErr);
  ico.textContent = isErr ? '!' : '✓';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 3000);
}

/* ══ 버튼 플래시 ══ */
function flashBtn(loc){
  document.querySelectorAll('.loc-btn').forEach(btn=>{
    if(btn.textContent.trim().includes(loc)){
      btn.classList.add('flash');
      setTimeout(()=> btn.classList.remove('flash'), 600);
    }
  });
}
</script>
